{% extends "base.html" %}
{% block content %}
<div class="card auth-card">
    <h2>Admin Registration</h2>
    <p>Use your own admin email and password.</p>
    <form method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email_username">Email</label>
        <div class="email-username-wrap">
            <input type="text" id="email_username" data-email-username placeholder="Enter email" required>
            <span class="email-domain-fixed">@gmail.com</span>
            <input type="hidden" id="email" name="email" data-email-hidden required>
        </div>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <label for="department">Department</label>
        <input type="text" id="department" name="department" required>

        <button type="submit">Create Admin Account</button>
    </form>
</div>
{% endblock %}
