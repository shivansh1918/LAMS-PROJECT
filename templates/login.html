{% extends "base.html" %}
{% block content %}
<div class="card auth-card">
    <h2>Common Login</h2>
    <form method="post">
        <label for="role">Role</label>
        <select id="role" name="role" required>
            <option value="">Select role</option>
            <option value="admin" {% if prefill_role == 'admin' %}selected{% endif %}>Admin</option>
            <option value="teacher" {% if prefill_role == 'teacher' %}selected{% endif %}>Teacher</option>
            <option value="student" {% if prefill_role == 'student' %}selected{% endif %}>Student</option>
        </select>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ prefill_email or '' }}" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" value="{{ prefill_password or '' }}" required>

        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
